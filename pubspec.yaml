name: app_ets
description: "Sistema de Gestión de ETS - ESCOM IPN"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
    # ── Firebase ─────────────────────────────────────
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5

  # ── Estado ──────────────────────────────────────
  flutter_riverpod: ^3.3.1

  # ── Base de datos local ──────────────────────────
  sqflite: ^2.4.1
  path: ^1.9.1

  # ── Inyección de dependencias ────────────────────
  get_it: ^8.0.3

  # ── Encriptación de contraseñas ──────────────────
  crypto: ^3.0.6

  # ── Notificaciones locales ───────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # ── Exportar PDF ─────────────────────────────────
  pdf: ^3.11.3
  printing: ^5.14.2

  # ── Abrir URLs / Maps ────────────────────────────
  url_launcher: ^6.3.1

  # ── Preferencias simples ─────────────────────────
  shared_preferences: ^2.5.3

  # ── IDs únicos ───────────────────────────────────
  uuid: ^4.5.1

  # ── Íconos ───────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── Supabase ─────────────────────────────────────
  supabase_flutter: ^2.8.4

  # ── Conectividad ──────────────────────────────────
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/ipn_logo.png
    - assets/images/escom_logo.png
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "assets/images/app_icon.png"
  adaptive_icon_foreground: "assets/images/app_icon.png"